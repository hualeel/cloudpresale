services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: presale-postgres
    environment:
      POSTGRES_USER: presale
      POSTGRES_PASSWORD: presale123
      POSTGRES_DB: presale_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presale -d presale_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: presale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO（对象存储） ──
  minio:
    image: minio/minio:latest
    container_name: presale-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB（向量库，供 RAG 使用） ──
  chroma:
    image: chromadb/chroma:latest
    container_name: presale-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  # ── FastAPI 后端（开发模式，挂载代码热重载） ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: presale-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+psycopg://presale:presale123@postgres:5432/presale_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      FRONTEND_URL: http://localhost:5173
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    profiles:
      - full   # 仅在 --profile full 时启动

volumes:
  postgres_data:
  redis_data:
  minio_data:
  chroma_data:
